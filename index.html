<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Little Universe For Zahra ❤️</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Poppins:wght@400;700&display=swap');

*{
box-sizing:border-box;
font-family:'Cairo','Poppins',sans-serif;
}

body{

margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#18001f,#4b003f,#a00065);
display:flex;
justify-content:center;
align-items:center;
color:white;

}


.container{

width:90%;
max-width:850px;
padding:40px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(20px);
border-radius:35px;
text-align:center;
box-shadow:0 0 60px rgba(255,120,190,.5);

}


h1{

font-size:42px;
color:#ffd1e8;

}


#text{

font-size:23px;
line-height:2;
min-height:250px;

}


button{

background:#ff4f9a;
border:none;
color:white;
padding:15px 30px;
border-radius:50px;
font-size:19px;
margin:8px;
cursor:pointer;
transition:.3s;

}


button:hover{

transform:scale(1.1);
background:#ff78b7;

}


.hidden{

display:none;

}


.heart{

position:absolute;
font-size:30px;
animation:up 6s linear forwards;

}


.flower{

position:absolute;
font-size:35px;
animation:down 8s linear forwards;

}



@keyframes up{

from{

transform:translateY(100vh);
opacity:1;

}

to{

transform:translateY(-120vh);
opacity:0;

}

}



@keyframes down{

from{

transform:translateY(-20vh);
opacity:1;

}

to{

transform:translateY(120vh);
opacity:0;

}

}



</style>

</head>


<body>



<div class="container">


<h1 id="title">
❤️ A Little Universe For Zahra ❤️
</h1>



<div id="language">

<h2>
اختاري اللغة / Choose your language
</h2>


<button onclick="start('ar')">
🇩🇿 العربية
</button>


<button onclick="start('en')">
🇬🇧 English
</button>


</div>




<div id="content" class="hidden">


<div id="text"></div>


<div id="buttons"></div>


</div>



</div>




<script>


let lang="ar";
let step=0;



const ar=[


`
مرحباً زهرة ❤️

<br><br>

صنعت لكِ هذا المكان الصغير لأقول لك شيئًا لا تكفيه الكلمات...

🌹

`,


`
🤖 جهاز الحب بدأ الفحص...

<br><br>

🔍 جاري تحليل زهرة...

<br><br>

❤️ مستوى الطيبة: لا يمكن قياسه

<br>

🌹 مستوى الجمال: خطير جدًا

<br>

😂 قوة الضحكة: خارج السيطرة

<br>

😘 نقص القبلات: حالة طارئة

<br>

🫂 نقص الأحضان: يحتاج تدخل سريع

`,


`
زهرة ❤️

<br><br>

أريدك أن تعرفي أنكِ شخص مميز جدًا بالنسبة لي.

<br><br>

أنتِ لستِ مجرد شخص دخل حياتي...

أنتِ شخص جعلها أجمل.

`,


`
أحب ضحكتك، كلامك، طريقتك،
وكل التفاصيل الصغيرة التي تجعلك أنتِ ❤️

<br><br>

وجودك يجعل الأشياء العادية أجمل.

`,


`
لا أعدك أن الحياة ستكون دائمًا سهلة...

<br><br>

لكن أعدك أنني سأحاول دائمًا أن أكون سببًا في ابتسامتك وسعادتك ❤️

`,


`
زهرة 🌹

<br><br>

لو كان بإمكاني أن أجعلك ترين نفسك من عيني...

سترين كم أنتِ جميلة ومميزة ومحبوبة.

<br><br>

أحبك ❤️

`

];





const en=[


`
Welcome Zahra ❤️

<br><br>

I created this little universe to tell you something words are not enough to explain...

🌹

`,


`
🤖 Love AI Scanner activated...

<br><br>

🔍 Scanning Zahra...

<br><br>

❤️ Kindness level: Impossible to measure

<br>

🌹 Beauty level: Extremely dangerous

<br>

😂 Smile power: Out of control

<br>

😘 Kisses needed: Emergency

<br>

🫂 Hug level: Critical situation

`,


`
Zahra ❤️

<br><br>

I want you to know that you are someone truly special to me.

<br><br>

You are not just someone who entered my life...

You are someone who made it better.

`,


`
I love your smile, your personality,
your words, and every little thing that makes you who you are ❤️

<br><br>

You make ordinary moments special.

`,


`
I can't promise every day will be perfect...

<br><br>

But I promise I will always try to be a reason for your smile and happiness ❤️

`,


`
Zahra 🌹

<br><br>

If I could show you yourself through my eyes...

You would see how beautiful, special, and loved you truly are.

<br><br>

I love you ❤️

`

];





function start(language){

lang=language;

document.getElementById("language").classList.add("hidden");

document.getElementById("content").classList.remove("hidden");


if(lang=="en"){

document.getElementById("title").innerHTML=
"❤️ A Little Universe For Zahra ❤️";

}

show();

}





function show(){

let arr=lang=="ar"?ar:en;

document.getElementById("text").innerHTML=arr[step];


buttons();

hearts();

}




function next(){

step++;


let arr=lang=="ar"?ar:en;


if(step>=arr.length){

step=0;

}


show();

}




function buttons(){

let b=document.getElementById("buttons");


b.innerHTML="";


if(step < 5){

b.innerHTML+=`

<button onclick="next()">

${lang=="ar"?"التالي ❤️":"Next ❤️"}

</button>

`;

}


if(step>=2){

b.innerHTML+=`

<button onclick="kiss()">

😘 ${lang=="ar"?"قبلة":"Kiss"}

</button>


<button onclick="hug()">

🫂 ${lang=="ar"?"حضن":"Hug"}

</button>


<button onclick="funny()">

😂 ${lang=="ar"?"ضحكني":"Make me laugh"}

</button>

`;

}

}




function kiss(){

document.getElementById("text").innerHTML=

lang=="ar"?

"😘 تم إرسال قبلة بنجاح... لكن الجهاز يقول: قبلة واحدة لا تكفي 😂❤️"

:

"😘 Kiss delivered successfully... but the system says: one is not enough 😂❤️";

hearts();

}




function hug(){

document.getElementById("text").innerHTML=

lang=="ar"?

"🫂 تم تشغيل وضع الحضن الطويل... الرجاء البقاء حتى انتهاء السعادة ❤️"

:

"🫂 Long hug mode activated... please stay until happiness is complete ❤️";

hearts();

}





function funny(){

let a=lang=="ar"?

[

"😂 تحذير: مستوى الابتسامة تجاوز الحد المسموح",

"🤖 الجهاز يقول: زهرة تحتاج جرعة ضحك إضافية",

"😘 تم إرسال قبلة احتياطية بسبب كثرة اللطافة"

]

:

[

"😂 Warning: Smile level exceeded",

"🤖 System says: Zahra needs extra laughter",

"😘 Extra kiss sent because of too much cuteness"

];


document.getElementById("text").innerHTML=

a[Math.floor(Math.random()*a.length)];

hearts();

}




function hearts(){

for(let i=0;i<12;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML=Math.random()>0.5?"❤️":"😘";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(3+Math.random()*4)+"s";

document.body.appendChild(h);


setTimeout(()=>h.remove(),6000);

}

}





</script>


</body>

</html>
